# QueryBridge — Production Stack
# Run: docker compose up
# Reach via: https://failsafe.amd.com/query-bridge/

services:
  # ─── QueryBridge API Server ──────────────────────────────────────────
  api:
    build: .
    container_name: querybridge_api
    environment:
      # Reads from .env — connects to Silicon Trace PostgreSQL
      QUERYBRIDGE_DSN: ${QUERYBRIDGE_DSN}
      QUERYBRIDGE_API_KEY: ${QUERYBRIDGE_API_KEY}
      QUERYBRIDGE_BASE_URL: ${QUERYBRIDGE_BASE_URL}
      QUERYBRIDGE_MODEL: ${QUERYBRIDGE_MODEL:-gpt-4}
      QUERYBRIDGE_PROVIDER: ${QUERYBRIDGE_PROVIDER:-openai}
      # Snowflake (optional second datasource)
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-}
      SNOWFLAKE_PRIVATE_KEY_PATH: ${SNOWFLAKE_PRIVATE_KEY_PATH:-}
      CORS_ORIGINS: "https://failsafe.amd.com,http://localhost:3000"
    ports:
      - "8200:8000"
    volumes:
      - ./.snowflake:/app/.snowflake:ro
    command: >
      uvicorn querybridge.server.api:app
      --host 0.0.0.0
      --port 8000
    networks:
      - querybridge_network
      - failsafe_network

  # ─── Playground UI ──────────────────────────────────────────────────
  playground:
    build: ./playground
    container_name: querybridge_playground
    ports:
      - "3100:3000"
    depends_on:
      - api
    networks:
      - querybridge_network
      - failsafe_network

networks:
  querybridge_network:
    driver: bridge
  failsafe_network:
    name: failsafedashboard_failsafe_network
    external: true
