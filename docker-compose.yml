# QueryBridge — Docker Stack
# Usage: cp .env.example .env && docker compose up
# Open:  http://localhost:3000 (playground) or http://localhost:8000 (API)

services:
  # ─── QueryBridge API Server ──────────────────────────────────────────
  api:
    build: .
    container_name: querybridge_api
    environment:
      # Database (optional — demo Chinook DB loads automatically if omitted)
      QUERYBRIDGE_DSN: ${QUERYBRIDGE_DSN:-}
      QUERYBRIDGE_DEFAULT_NAME: ${QUERYBRIDGE_DEFAULT_NAME:-}
      # LLM provider (required — configure in .env or via the ⚙ Settings panel)
      QUERYBRIDGE_API_KEY: ${QUERYBRIDGE_API_KEY:-}
      QUERYBRIDGE_BASE_URL: ${QUERYBRIDGE_BASE_URL:-}
      QUERYBRIDGE_MODEL: ${QUERYBRIDGE_MODEL:-gpt-4o}
      QUERYBRIDGE_PROVIDER: ${QUERYBRIDGE_PROVIDER:-openai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3100}
    ports:
      - "8000:8000"
    command: >
      uvicorn querybridge.server.api:app
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    networks:
      - querybridge

  # ─── Playground UI ──────────────────────────────────────────────────
  playground:
    build: ./playground
    container_name: querybridge_playground
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - querybridge

networks:
  querybridge:
    driver: bridge
